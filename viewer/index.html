<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #screen {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: none;
        }
        #status {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.65);
            border-radius: 8px;
            font-size: 13px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <img id="screen" alt="Live screen">

    <script>
        const statusEl = () => document.getElementById('status');

        function connect() {
            const img = document.getElementById('screen');
            const url = '/stream?t=' + Date.now();

            img.onload = () => {
                img.style.display = 'block';
                statusEl().textContent = 'Streaming';
            };
            img.onerror = () => {
                statusEl().textContent = 'Disconnected - retrying...';
                img.style.display = 'none';
                // Auto-reconnect: screen capture may not be ready yet, or the
                // service restarted. Retry after a short delay.
                setTimeout(connect, 2000);
            };

            statusEl().textContent = 'Connecting...';
            img.src = url;
        }

        // Start streaming immediately on page load - no token, no button.
        connect();
    </script>
</body>
</html>
